<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小瓦咖啡助手后台管理</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body>
    <main id="loginView" class="login-shell">
      <form id="loginForm" class="login-card">
        <h1>后台登录</h1>
        <p>登录后维护咖啡 SOP 产品数据</p>
        <label>
          用户名
          <input id="usernameInput" autocomplete="username" required placeholder="请输入用户名" />
        </label>
        <label>
          密码
          <input id="passwordInput" type="password" autocomplete="current-password" required placeholder="请输入密码" />
        </label>
        <button type="submit" class="primary">登录</button>
      </form>
    </main>

    <main id="adminView" class="shell hidden admin-layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <h1>小瓦咖啡助手后台</h1>
          <p>好喝多一点,热量少一点</p>
        </div>
        <nav class="sidebar-nav">
          <button type="button" class="nav-link active" data-section="productsSection">产品 SOP</button>
          <button type="button" class="nav-link" data-section="usersSection">小程序用户</button>
          <button type="button" class="nav-link" data-section="settingsSection">小程序设置</button>
          <button type="button" class="nav-link" data-section="glossarySection">“我学会了”统计</button>
        </nav>
        <button id="logoutBtn" class="sidebar-logout">退出登录</button>
      </aside>

      <section class="content-shell">
        <section id="productsSection" class="content-panel">
          <section class="toolbar">
            <div>
              <h2>产品 SOP</h2>
              <p>支持给产品加分类，列表里会直接显示在品名后面</p>
            </div>
            <div class="actions">
              <input id="keywordInput" type="search" placeholder="搜索产品名或分类" />
              <button id="searchBtn">搜索</button>
              <button id="newBtn" class="primary">新增产品</button>
            </div>
          </section>

          <section class="panel">
            <table>
              <thead>
                <tr>
                  <th>品名</th>
                  <th>已配置规格</th>
                  <th>更新时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="productBody"></tbody>
            </table>
            <div id="emptyState" class="empty">暂无产品</div>
          </section>
        </section>

        <section id="usersSection" class="content-panel hidden">
          <section class="panel user-panel">
            <div class="panel-title">
              <div>
                <h2>小程序用户</h2>
                <p>只有这里添加并启用的账号，才能登录小程序查询 SOP</p>
              </div>
              <button id="newUserBtn" class="primary">新增用户</button>
            </div>
            <table class="user-table">
              <thead>
                <tr>
                  <th>账号</th>
                  <th>姓名/备注</th>
                  <th>状态</th>
                  <th>更新时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="userBody"></tbody>
            </table>
            <div id="userEmptyState" class="empty">暂无小程序用户</div>
          </section>
        </section>

        <section id="settingsSection" class="content-panel hidden">
          <section class="panel settings-panel">
            <div class="panel-title">
              <div>
                <h2>小程序设置</h2>
                <p>可配置首页、常识页、个人中心显示的 Logo 地址</p>
              </div>
            </div>
            <form id="settingsForm" class="settings-form">
              <label>
                Logo URL
                <input id="logoUrlInput" type="url" placeholder="https://example.com/logo.gif 或 logo.svg" />
              </label>
              <div class="settings-actions">
                <button type="submit" class="primary">保存设置</button>
              </div>
            </form>
          </section>
        </section>

        <section id="glossarySection" class="content-panel hidden">
          <section class="panel glossary-panel">
            <div class="panel-title">
              <div>
                <h2>“我学会了”统计</h2>
                <p>查看首页 SOP 常识按钮的点击情况</p>
              </div>
              <button id="refreshGlossaryBtn">刷新</button>
            </div>
            <div class="glossary-stats">
              <div class="stat-card">
                <span class="stat-label">总点击数</span>
                <strong id="glossaryTotal">0</strong>
              </div>
            </div>
            <div class="glossary-grid">
              <div class="glossary-block">
                <h3>常识点击排行</h3>
                <div id="glossaryTopList" class="glossary-list empty-inline">暂无数据</div>
              </div>
              <div class="glossary-block">
                <h3>最近点击记录</h3>
                <div id="glossaryRecentList" class="glossary-list empty-inline">暂无数据</div>
              </div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <dialog id="editorDialog">
      <form id="productForm" method="dialog">
        <header>
          <h2 id="dialogTitle">新增产品</h2>
          <button type="button" id="closeBtn" class="ghost">关闭</button>
        </header>
        <input type="hidden" id="idInput" />
        <input type="hidden" id="previousNameInput" />
        <label>
          品名
          <input id="nameInput" required placeholder="例如：冰拿铁" />
        </label>
        <label>
          分类
          <input id="categoryInput" placeholder="例如：拿铁 / 美式 / 果咖 / 茶拿铁" />
        </label>
        <section class="variant-grid">
          <article class="variant-card" data-variant="standardCold">
            <label class="check"><input data-field="enabled" type="checkbox" />标准杯（冰）</label>
            <div class="variant-meta">
              <label class="check"><input data-field="isRecommended" type="checkbox" />推荐</label>
              <label>热度值<input data-field="hotScore" type="number" min="0" step="1" value="0" /></label>
            </div>
            <textarea data-field="method" rows="5" placeholder="1. 加冰&#10;2. 加牛奶 30ml"></textarea>
          </article>
          <article class="variant-card" data-variant="standardHot">
            <label class="check"><input data-field="enabled" type="checkbox" />标准杯（热）</label>
            <div class="variant-meta">
              <label class="check"><input data-field="isRecommended" type="checkbox" />推荐</label>
              <label>热度值<input data-field="hotScore" type="number" min="0" step="1" value="0" /></label>
            </div>
            <textarea data-field="method" rows="5" placeholder="1. 加热水&#10;2. 点击意式精粹"></textarea>
          </article>
          <article class="variant-card" data-variant="bucketCold">
            <label class="check"><input data-field="enabled" type="checkbox" />吨吨桶（冰）</label>
            <div class="variant-meta">
              <label class="check"><input data-field="isRecommended" type="checkbox" />推荐</label>
              <label>热度值<input data-field="hotScore" type="number" min="0" step="1" value="0" /></label>
            </div>
            <textarea data-field="method" rows="5" placeholder="1. 加冰&#10;2. 加牛奶至杯线"></textarea>
          </article>
          <article class="variant-card" data-variant="bucketHot">
            <label class="check"><input data-field="enabled" type="checkbox" />吨吨桶（热）</label>
            <div class="variant-meta">
              <label class="check"><input data-field="isRecommended" type="checkbox" />推荐</label>
              <label>热度值<input data-field="hotScore" type="number" min="0" step="1" value="0" /></label>
            </div>
            <textarea data-field="method" rows="5" placeholder="1. 加热水&#10;2. 加浓缩咖啡"></textarea>
          </article>
        </section>
        <footer>
          <button type="submit" class="primary">保存</button>
        </footer>
      </form>
    </dialog>

    <dialog id="userDialog">
      <form id="userForm" method="dialog">
        <header>
          <h2 id="userDialogTitle">新增用户</h2>
          <button type="button" id="userCloseBtn" class="ghost">关闭</button>
        </header>
        <input type="hidden" id="userIdInput" />
        <div class="row">
          <label>
            登录账号
            <input id="appUsernameInput" autocomplete="off" required placeholder="例如：store01" />
          </label>
          <label>
            姓名/备注
            <input id="displayNameInput" autocomplete="off" placeholder="例如：门店 A" />
          </label>
        </div>
        <label>
          密码
          <input id="appPasswordInput" type="password" autocomplete="new-password" placeholder="新增必填，编辑时留空则不修改" />
        </label>
        <label class="check">
          <input id="isActiveInput" type="checkbox" checked />
          启用账号
        </label>
        <footer>
          <button type="submit" class="primary">保存用户</button>
        </footer>
      </form>
    </dialog>

    <div id="toast"></div>
    <script src="/admin.js"></script>
  </body>
</html>
